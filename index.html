<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ファンド・ウォッチャー — 基準価額と指数</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0f1419; --panel:#1a2029; --panel2:#222a35; --line:#2c3540;
    --txt:#e6edf3; --sub:#8b98a5; --accent:#3b82f6; --ma1:#f59e0b; --ma2:#a855f7; --idx:#22d3ee;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:"Segoe UI","Meiryo",system-ui,sans-serif;line-height:1.5}
  .wrap{max-width:880px;margin:0 auto;padding:16px}
  h1{font-size:18px;margin:4px 0 2px}
  .updated{color:var(--sub);font-size:12px;margin-bottom:14px}
  .tabs{display:flex;gap:8px;margin-bottom:14px}
  .tab{flex:1;padding:10px;border:1px solid var(--line);background:var(--panel);
    color:var(--sub);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;text-align:center}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .fundname{font-size:12px;color:var(--sub);margin-bottom:10px}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  .card .lbl{font-size:11px;color:var(--sub);margin-bottom:4px}
  .card .big{font-size:26px;font-weight:700}
  .card .sub{font-size:13px;margin-top:2px}
  .up{color:#22c55e}.down{color:#ef4444}
  .gauge{grid-column:1 / -1;text-align:center;padding:16px}
  .gauge .badge{display:inline-block;padding:6px 16px;border-radius:999px;
    font-size:20px;font-weight:700;margin-bottom:8px}
  .gauge .det{font-size:13px;color:var(--sub)}
  .tech{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
  .tech .t{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 6px;text-align:center}
  .tech .t .tl{font-size:10px;color:var(--sub)}
  .tech .t .tv{font-size:19px;font-weight:700;margin-top:3px}
  .tech .t .ts{font-size:10px;margin-top:3px;color:var(--sub)}
  @media(max-width:520px){.tech{grid-template-columns:repeat(2,1fr)}}
  .periods{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .pbtn{padding:7px 12px;border:1px solid var(--line);background:var(--panel);
    color:var(--sub);border-radius:8px;font-size:13px;cursor:pointer}
  .pbtn.active{background:var(--panel2);color:var(--txt);border-color:var(--accent)}
  .chartbox{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 8px 4px;
    position:relative;height:360px}
  .toggles{display:flex;gap:14px;flex-wrap:wrap;margin:12px 2px;font-size:13px;color:var(--sub)}
  .toggles label{cursor:pointer;user-select:none}
  .hint{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--idx);
    border-radius:10px;padding:12px 14px;margin-top:14px;font-size:13px}
  .hint b{color:var(--idx)}
  .foot{color:var(--sub);font-size:11px;margin-top:18px;line-height:1.7}
  .foot code{background:var(--panel2);padding:1px 6px;border-radius:5px}
</style>
</head>
<body>
<div class="wrap">
  <h1>📉 ファンド・ウォッチャー</h1>
  <div class="updated" id="updated"></div>

  <div class="tabs" id="tabs"></div>
  <div class="fundname" id="fundname"></div>

  <div class="cards">
    <div class="card">
      <div class="lbl">最新 基準価額</div>
      <div class="big" id="navNow"></div>
      <div class="sub" id="navChg"></div>
    </div>
    <div class="card">
      <div class="lbl">過去最高値</div>
      <div class="big" id="ath"></div>
      <div class="sub" id="athDate"></div>
    </div>
    <div class="card gauge">
      <div class="lbl">バーゲン度（過去最高値からの下落率）</div>
      <div class="badge" id="badge"></div>
      <div class="det" id="gaugeDet"></div>
    </div>
  </div>

  <div class="lbl" style="font-size:11px;color:var(--sub);margin:2px 2px 6px">テクニカル指標（買い場サイン）</div>
  <div class="tech" id="tech"></div>

  <div class="periods" id="periods"></div>
  <div class="chartbox"><canvas id="chart"></canvas></div>
  <div class="toggles">
    <label><input type="checkbox" id="tMa" checked> 移動平均線(25/75/200日)</label>
    <label><input type="checkbox" id="tIdx" checked> 指数を重ねる(形を比較)</label>
  </div>

  <div class="hint" id="hint"></div>

  <div class="foot">
    ・基準価額は1営業日に1回（夜）更新。指数（米国市場）の値動きは<b>翌営業日の基準価額</b>に反映されます。<br>
    ・指数は通貨が異なる(USD)ため、グラフでは形の比較用に基準価額へ合わせて正規化しています（為替差は含みません）。<br>
    ・データ更新： <code>update.bat</code> をダブルクリック → このページを再読み込み（Ctrl+F5）。
  </div>
</div>

<script src="data.js"></script>
<script>
const COLORS={nav:'#3b82f6',ma1:'#f59e0b',ma2:'#a855f7',ma3:'#64748b',idx:'#22d3ee'};
let curKey=null, curDays=365, chart=null;

const fmt=n=>n.toLocaleString('ja-JP');
const pct=n=>(n>=0?'+':'')+n.toFixed(2)+'%';

function sma(vals,n){
  const out=new Array(vals.length).fill(null);
  let sum=0;
  for(let i=0;i<vals.length;i++){
    sum+=vals[i];
    if(i>=n) sum-=vals[i-n];
    if(i>=n-1) out[i]=sum/n;
  }
  return out;
}

// RSI(14) — Wilder平滑。<30=売られすぎ(買い場)、>70=買われすぎ
function rsi(vals,period=14){
  if(vals.length<period+1) return null;
  let g=0,l=0;
  for(let i=1;i<=period;i++){const d=vals[i]-vals[i-1]; if(d>=0)g+=d; else l-=d;}
  let aG=g/period,aL=l/period;
  for(let i=period+1;i<vals.length;i++){
    const d=vals[i]-vals[i-1];
    aG=(aG*(period-1)+(d>0?d:0))/period;
    aL=(aL*(period-1)+(d<0?-d:0))/period;
  }
  if(aL===0) return 100;
  return 100-100/(1+aG/aL);
}

// 指数の日付->値マップ（窓の開始日に合わせて正規化するのに使う）
function indexMap(series){
  const m=new Map();
  for(const [d,v] of series) m.set(d,v);
  return m;
}
// 指定日以前で最も近い指数値
function idxAt(series,dateStr){
  let lo=0,hi=series.length-1,ans=null;
  while(lo<=hi){const mid=(lo+hi)>>1;
    if(series[mid][0]<=dateStr){ans=series[mid][1];lo=mid+1;}else hi=mid-1;}
  return ans;
}

function setupTabs(){
  const tabs=document.getElementById('tabs');
  Object.keys(DATA.funds).forEach((k,i)=>{
    const b=document.createElement('div');
    b.className='tab'+(i===0?' active':'');
    b.textContent=DATA.funds[k].short;
    b.onclick=()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      b.classList.add('active');curKey=k;render();};
    tabs.appendChild(b);
    if(i===0) curKey=k;
  });
}
function setupPeriods(){
  const opts=[['3ヶ月',90],['6ヶ月',180],['1年',365],['3年',1095],['全期間',99999]];
  const box=document.getElementById('periods');
  opts.forEach(([lbl,d])=>{
    const b=document.createElement('div');
    b.className='pbtn'+(d===curDays?' active':'');
    b.textContent=lbl;
    b.onclick=()=>{document.querySelectorAll('.pbtn').forEach(t=>t.classList.remove('active'));
      b.classList.add('active');curDays=d;render();};
    box.appendChild(b);
  });
}

function badgeFor(dd){ // dd: 下落率(負の数)
  if(dd> -2)  return ['高値圏',  '#334155','#cbd5e1','今は高め。慌てず待ち。'];
  if(dd> -4)  return ['小休止🟢','#14532d','#86efac','軽い調整。様子見。'];
  if(dd> -7)  return ['押し目🟡','#713f12','#fde047','押し目。買い検討ゾーン。'];
  if(dd> -12) return ['バーゲン🟠','#7c2d12','#fdba74','しっかり下落。買い増し有力。'];
  return ['大バーゲン🔥','#7f1d1d','#fca5a5','歴史的な下落水準。仕込み時。'];
}

function render(){
  const f=DATA.funds[curKey];
  document.getElementById('fundname').textContent=f.name+'（協会コード '+f.code+'）';

  // --- 全期間の基準価額 ---
  const navDates=f.nav.map(p=>p[0]);
  const navVals =f.nav.map(p=>p[1]);
  const lastIdx=navVals.length-1;
  const navNow=navVals[lastIdx], navPrev=navVals[lastIdx-1];
  const dchg=navNow-navPrev, dpct=dchg/navPrev*100;

  // ATH
  let ath=-Infinity,athi=0;
  for(let i=0;i<navVals.length;i++) if(navVals[i]>ath){ath=navVals[i];athi=i;}
  const ddAth=(navNow/ath-1)*100;

  document.getElementById('navNow').textContent=fmt(navNow)+'円';
  const chgEl=document.getElementById('navChg');
  chgEl.innerHTML='前日比 '+(dchg>=0?'+':'')+fmt(dchg)+'円 ('+pct(dpct)+')';
  chgEl.className='sub '+(dchg>=0?'up':'down');
  document.getElementById('ath').textContent=fmt(ath)+'円';
  document.getElementById('athDate').textContent=navDates[athi]+' 時点';

  const [label,bg,fg,desc]=badgeFor(ddAth);
  const badge=document.getElementById('badge');
  badge.textContent=label+'  '+ddAth.toFixed(1)+'%';
  badge.style.background=bg; badge.style.color=fg;
  document.getElementById('gaugeDet').textContent=desc+'（最高値 '+fmt(ath)+'円 → 現在 '+fmt(navNow)+'円）';

  // --- 移動平均（全期間で計算してから窓で切る）---
  const ma25=sma(navVals,25), ma75=sma(navVals,75), ma200=sma(navVals,200);

  // --- テクニカル指標（RSI・移動平均かい離率）---
  const rv=rsi(navVals);
  let rState,rCol;
  if(rv==null){rState='—';rCol='#cbd5e1';}
  else if(rv<30){rState='売られすぎ(買い場)';rCol='#22c55e';}
  else if(rv<45){rState='やや弱い';rCol='#86efac';}
  else if(rv<=70){rState='中立';rCol='#94a3b8';}
  else {rState='買われすぎ';rCol='#ef4444';}

  function devCell(label,mav){
    if(mav==null||mav===undefined) return {l:label,v:'—',c:'#cbd5e1',s:'データ不足'};
    const d=(navNow/mav-1)*100;
    let c,s;
    if(d<=-5){c='#22c55e';s='大きく下回る';}
    else if(d<0){c='#86efac';s='線の下';}
    else if(d<5){c='#94a3b8';s='線の上';}
    else {c='#f59e0b';s='大きく上回る';}
    return {l:label,v:(d>=0?'+':'')+d.toFixed(1)+'%',c,s};
  }
  const cells=[
    {l:'RSI(14)',v:rv==null?'—':rv.toFixed(0),c:rCol,s:rState},
    devCell('25日線かい離',ma25[lastIdx]),
    devCell('75日線かい離',ma75[lastIdx]),
    devCell('200日線かい離',ma200[lastIdx])
  ];
  document.getElementById('tech').innerHTML=cells.map(c=>
    '<div class="t"><div class="tl">'+c.l+'</div>'+
    '<div class="tv" style="color:'+c.c+'">'+c.v+'</div>'+
    '<div class="ts">'+c.s+'</div></div>').join('');

  // --- 窓を決める ---
  let start=0;
  if(curDays<99999){
    const cutoff=new Date(navDates[lastIdx]); cutoff.setDate(cutoff.getDate()-curDays);
    const cs=cutoff.toISOString().slice(0,10);
    start=navDates.findIndex(d=>d>=cs); if(start<0)start=0;
  }
  const L=navDates.slice(start);
  const showMa=document.getElementById('tMa').checked;
  const showIdx=document.getElementById('tIdx').checked;

  // 指数を窓開始の基準価額に合わせて正規化
  const idxFirst=idxAt(f.index,L[0]);
  const scale = idxFirst ? navVals[start]/idxFirst : 1;
  const idxLine=L.map(d=>{const v=idxAt(f.index,d);return v?+(v*scale).toFixed(0):null;});

  const ds=[{label:'基準価額',data:navVals.slice(start),borderColor:COLORS.nav,
      borderWidth:2,pointRadius:0,tension:.1,fill:false,order:1}];
  if(showIdx) ds.push({label:'指数(正規化)',data:idxLine,borderColor:COLORS.idx,
      borderWidth:1.5,borderDash:[5,3],pointRadius:0,tension:.1,fill:false,order:0});
  if(showMa){
    ds.push({label:'25日',data:ma25.slice(start),borderColor:COLORS.ma1,borderWidth:1,pointRadius:0,fill:false});
    ds.push({label:'75日',data:ma75.slice(start),borderColor:COLORS.ma2,borderWidth:1,pointRadius:0,fill:false});
    ds.push({label:'200日',data:ma200.slice(start),borderColor:COLORS.ma3,borderWidth:1,pointRadius:0,fill:false});
  }

  if(chart) chart.destroy();
  chart=new Chart(document.getElementById('chart'),{
    type:'line',
    data:{labels:L,datasets:ds},
    options:{
      responsive:true,maintainAspectRatio:false,animation:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'#8b98a5',boxWidth:14,font:{size:11}}},
        tooltip:{callbacks:{label:c=>c.dataset.label+': '+(c.parsed.y==null?'-':fmt(c.parsed.y)+(c.dataset.label==='基準価額'?'円':''))}}},
      scales:{
        x:{ticks:{color:'#5b6671',maxTicksLimit:7,font:{size:10}},grid:{display:false}},
        y:{ticks:{color:'#5b6671',font:{size:10},callback:v=>fmt(v)},grid:{color:'#222a35'}}
      }
    }
  });

  // --- 指数ヒント ---
  const ix=f.index, ixLast=ix[ix.length-1], ixPrev=ix[ix.length-2];
  const ixChg=(ixLast[1]/ixPrev[1]-1)*100;
  document.getElementById('hint').innerHTML=
    '<b>'+f.indexName+'</b> 最新 '+fmt(ixLast[1])+'（'+ixLast[0]+'） 前日比 '+
    '<span class="'+(ixChg>=0?'up':'down')+'">'+pct(ixChg)+'</span><br>'+
    '指数のこの動きは、おおむね<b>翌営業日の基準価額</b>に反映されます（為替次第で増減）。'+
    (navDates[lastIdx]<ixLast[0]?'　※基準価額(' + navDates[lastIdx] + ')は指数より日付が古いので、次の更新で追いつきます。':'');
}

document.getElementById('updated').textContent='データ取得: '+DATA.generatedAt+' 時点';
document.getElementById('tMa').onchange=render;
document.getElementById('tIdx').onchange=render;
setupTabs();
setupPeriods();
render();
</script>
</body>
</html>
