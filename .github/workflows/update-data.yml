name: Update Fund Data

on:
  schedule:
    - cron: '0 13 * * 1-5'   # 22:00 JST weekdays (after NAV published)
  workflow_dispatch:           # manual trigger from GitHub UI (works on mobile)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - run: python update.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --cached --quiet && echo "No changes." || (
            git commit -m "Update fund data $(date -u +'%Y-%m-%d')" &&
            git push
          )
