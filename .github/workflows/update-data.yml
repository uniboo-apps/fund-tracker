name: Update Fund Data

on:
  schedule:
    - cron: '0 11,12,13 * * 1-5'  # 20:00/21:00/22:00 JST weekdays
    - cron: '0 20,21 * * 0-4'     # 05:00/06:00 JST weekdays (catch prior-day NAV)
  workflow_dispatch:           # manual trigger from GitHub UI (works on mobile)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests==2.32.3

      - run: python update.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --cached --quiet && echo "No changes to commit." || (
            git commit -m "Update fund data $(date -u +'%Y-%m-%d')" &&
            git push
          )

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 3441724797f692af21f432e8625165d9
        run: |
          NAME="${{ github.event.repository.name }}"
          # Add every new public asset to this allowlist.
          mkdir -p _site/icons
          cp index.html data.js sw.js manifest.json style.css app.js _headers _site/
          cp icons/*.png _site/icons/
          npx -y wrangler@4 pages deploy _site --project-name="$NAME" --branch=main --commit-dirty=true
