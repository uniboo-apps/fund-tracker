name: Deploy to Cloudflare Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Create project if missing & deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 3441724797f692af21f432e8625165d9
          NAME: ${{ github.event.repository.name }}
        run: |
          npx -y wrangler@4 pages project create "$NAME" --production-branch=main || true
          # Add every new public asset to this allowlist.
          mkdir -p _site/icons
          cp index.html 404.html data.js sw.js manifest.json style.css app.js _headers _site/
          cp icons/*.png _site/icons/
          npx -y wrangler@4 pages deploy _site --project-name="$NAME" --branch=main --commit-dirty=true
