name: Build Android Widget APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk fund-widget.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fund-widget-apk
          path: android/fund-widget.apk

      - name: Publish to Release (widget-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: widget-latest
          name: ファンドウィジェット（最新ビルド）
          body: |
            Android ホーム画面ウィジェット。
            スマホでこの下の `fund-widget.apk` をタップしてインストールしてください。
            （初回は「提供元不明のアプリ」を許可）
          files: android/fund-widget.apk
